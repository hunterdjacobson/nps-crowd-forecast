services:
  - type: web
    name: nps-crowd-api
    env: python
    buildCommand: "pip install -r api/requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NPS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
